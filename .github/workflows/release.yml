name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false
    runs-on: ${{ matrix.os }}
    env:
      PACKAGE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.run_number) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build release binary (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Create archive package
        shell: bash
        run: |
          ./scripts/package-artifact.sh "${{ matrix.target }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: socat-rs-${{ matrix.target }}
          path: |
            dist/*-${{ matrix.target }}.tar.gz
            dist/*-${{ matrix.target }}.tar.gz.sha256

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
